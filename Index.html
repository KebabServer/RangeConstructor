    <style>
        /* Container styling */
        .form-group {

            /* Spacing between fields */
        }

        /* Label styling */
        .form-group label {
            width: 100px;

            text-align: right;
            /* Align label text to the right */
            margin-right: 10px;
            /* Space between label and input */
        }

        /* Input field styling */
        .form-group input {
            color: black;
            padding: 5px;
            /* Add some padding inside the input */

        .button-group {
            color: black;
            margin: 20px;
            padding: 5px;

            height: 500px;

        #right-panel {

            /* Adds a border for clarity */
            margin: 0px;
